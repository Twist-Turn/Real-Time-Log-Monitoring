<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LogMonitor system workflow diagram</title>
  <desc>Data flow from log sources through ingestion, time-series storage, alert engine, and delivery channels with a live dashboard.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- SOURCES -->
  <rect x="20" y="60" width="130" height="44" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="85" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#2c2c2a">HTTP :9090</text>
  <text x="85" y="96" text-anchor="middle" font-size="11" fill="#5f5e5a">REST + API key auth</text>

  <rect x="20" y="128" width="130" height="44" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="85" y="146" text-anchor="middle" font-size="13" font-weight="500" fill="#2c2c2a">TCP :5514</text>
  <text x="85" y="164" text-anchor="middle" font-size="11" fill="#5f5e5a">Syslog-style senders</text>

  <rect x="20" y="196" width="130" height="44" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="85" y="214" text-anchor="middle" font-size="13" font-weight="500" fill="#2c2c2a">Python SDK</text>
  <text x="85" y="232" text-anchor="middle" font-size="11" fill="#5f5e5a">logmonitor.py</text>

  <!-- Source arrows -->
  <line x1="150" y1="82" x2="228" y2="155" stroke="#888" stroke-width="1" marker-end="url(#arrow)" stroke-opacity="0.6"/>
  <line x1="150" y1="150" x2="228" y2="162" stroke="#888" stroke-width="1" marker-end="url(#arrow)" stroke-opacity="0.6"/>
  <line x1="150" y1="218" x2="228" y2="170" stroke="#888" stroke-width="1" marker-end="url(#arrow)" stroke-opacity="0.6"/>

  <!-- INGESTION ENGINE -->
  <rect x="228" y="120" width="150" height="80" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="303" y="148" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Ingestion engine</text>
  <text x="303" y="168" text-anchor="middle" font-size="11" fill="#0f6e56">10 worker threads</text>
  <text x="303" y="184" text-anchor="middle" font-size="11" fill="#0f6e56">Rate limit 100 req/min</text>

  <!-- Ingest → TSDB -->
  <line x1="378" y1="160" x2="438" y2="160" stroke="#0f6e56" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- TIME-SERIES DB -->
  <rect x="438" y="120" width="150" height="80" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="513" y="148" text-anchor="middle" font-size="13" font-weight="500" fill="#3c3489">Time-series DB</text>
  <text x="513" y="168" text-anchor="middle" font-size="11" fill="#534ab7">24h auto-eviction</text>
  <text x="513" y="184" text-anchor="middle" font-size="11" fill="#534ab7">60s binary persistence</text>

  <!-- TSDB → Alert engine -->
  <line x1="513" y1="200" x2="513" y2="268" stroke="#534ab7" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ALERT ENGINE -->
  <rect x="438" y="268" width="150" height="80" rx="8" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
  <text x="513" y="296" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Alert rules engine</text>
  <text x="513" y="316" text-anchor="middle" font-size="11" fill="#854f0b">Threshold-based</text>
  <text x="513" y="332" text-anchor="middle" font-size="11" fill="#854f0b">Hot-reload alerts.json</text>

  <!-- alerts.json -->
  <rect x="438" y="388" width="150" height="44" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="513" y="406" text-anchor="middle" font-size="13" font-weight="500" fill="#2c2c2a">alerts.json</text>
  <text x="513" y="424" text-anchor="middle" font-size="11" fill="#5f5e5a">Rules config (hot-reload)</text>
  <line x1="513" y1="388" x2="513" y2="348" stroke="#888" stroke-width="0.75" stroke-dasharray="4 3" marker-end="url(#arrow)" stroke-opacity="0.5"/>

  <!-- Alert engine → delivery -->
  <line x1="588" y1="298" x2="618" y2="260" stroke="#ba7517" stroke-width="1" marker-end="url(#arrow)" stroke-opacity="0.6"/>
  <line x1="588" y1="308" x2="618" y2="308" stroke="#ba7517" stroke-width="1" marker-end="url(#arrow)" stroke-opacity="0.6"/>
  <line x1="588" y1="318" x2="618" y2="358" stroke="#ba7517" stroke-width="1" marker-end="url(#arrow)" stroke-opacity="0.6"/>

  <!-- DELIVERY -->
  <rect x="618" y="238" width="50" height="44" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="643" y="256" text-anchor="middle" font-size="11" font-weight="500" fill="#711b0c">Slack</text>
  <text x="643" y="272" text-anchor="middle" font-size="10" fill="#993c1d">Discord</text>

  <rect x="618" y="286" width="50" height="44" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="643" y="304" text-anchor="middle" font-size="11" font-weight="500" fill="#711b0c">HTTP</text>
  <text x="643" y="320" text-anchor="middle" font-size="10" fill="#993c1d">webhook</text>

  <rect x="618" y="334" width="50" height="44" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="643" y="352" text-anchor="middle" font-size="11" font-weight="500" fill="#711b0c">SMTP</text>
  <text x="643" y="368" text-anchor="middle" font-size="10" fill="#993c1d">email</text>

  <!-- TSDB → dashboard + ingest → dashboard -->
  <line x1="513" y1="200" x2="370" y2="268" stroke="#534ab7" stroke-width="1" marker-end="url(#arrow)" stroke-opacity="0.4"/>
  <line x1="303" y1="200" x2="303" y2="268" stroke="#0f6e56" stroke-width="1" marker-end="url(#arrow)" stroke-opacity="0.4"/>

  <!-- DASHBOARD -->
  <rect x="180" y="268" width="210" height="80" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text x="285" y="296" text-anchor="middle" font-size="13" font-weight="500" fill="#0c447c">ncurses dashboard</text>
  <text x="285" y="316" text-anchor="middle" font-size="11" fill="#185fa5">Apps · Log Feed · Alerts</text>
  <text x="285" y="332" text-anchor="middle" font-size="11" fill="#185fa5">Throughput graph (live)</text>

  <!-- PROMETHEUS -->
  <rect x="180" y="388" width="210" height="44" rx="8" fill="#eaf3de" stroke="#3b6d11" stroke-width="0.5"/>
  <text x="285" y="406" text-anchor="middle" font-size="13" font-weight="500" fill="#27500a">GET /metrics</text>
  <text x="285" y="424" text-anchor="middle" font-size="11" fill="#3b6d11">Prometheus-compatible</text>
  <line x1="285" y1="348" x2="285" y2="388" stroke="#185fa5" stroke-width="1" marker-end="url(#arrow)" stroke-opacity="0.5"/>

  <!-- QUERY API -->
  <rect x="20" y="388" width="130" height="44" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="85" y="406" text-anchor="middle" font-size="13" font-weight="500" fill="#2c2c2a">Query API</text>
  <text x="85" y="424" text-anchor="middle" font-size="11" fill="#5f5e5a">/query · /stats · /apps</text>
  <path d="M438 200 L438 410 L150 410" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)" stroke-opacity="0.4"/>

  <!-- SECTION LABELS -->
  <text x="85" y="46" text-anchor="middle" font-size="11" fill="#888780" font-style="italic">Log sources</text>
  <text x="303" y="108" text-anchor="middle" font-size="11" fill="#888780" font-style="italic">Ingestion</text>
  <text x="513" y="108" text-anchor="middle" font-size="11" fill="#888780" font-style="italic">Storage</text>
  <text x="513" y="256" text-anchor="middle" font-size="11" fill="#888780" font-style="italic">Alerting</text>
  <text x="285" y="256" text-anchor="middle" font-size="11" fill="#888780" font-style="italic">Observability</text>
  <text x="643" y="224" text-anchor="middle" font-size="11" fill="#888780" font-style="italic">Delivery</text>

  <!-- LEGEND -->
  <rect x="20" y="460" width="10" height="10" rx="2" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="36" y="470" font-size="11" fill="#5f5e5a">Ingestion</text>
  <rect x="100" y="460" width="10" height="10" rx="2" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="116" y="470" font-size="11" fill="#5f5e5a">Storage</text>
  <rect x="180" y="460" width="10" height="10" rx="2" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
  <text x="196" y="470" font-size="11" fill="#5f5e5a">Alerting</text>
  <rect x="260" y="460" width="10" height="10" rx="2" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text x="276" y="470" font-size="11" fill="#5f5e5a">Dashboard</text>
  <rect x="360" y="460" width="10" height="10" rx="2" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="376" y="470" font-size="11" fill="#5f5e5a">Delivery</text>
  <rect x="440" y="460" width="10" height="10" rx="2" fill="#eaf3de" stroke="#3b6d11" stroke-width="0.5"/>
  <text x="456" y="470" font-size="11" fill="#5f5e5a">Metrics</text>
  <rect x="510" y="460" width="10" height="10" rx="2" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="526" y="470" font-size="11" fill="#5f5e5a">I/O &amp; config</text>
</svg>
